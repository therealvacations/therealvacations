<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Payment Method | The Real Vacations</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://js.stripe.com/v3/"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'DM Sans', sans-serif; background: #f5f5f5; }
        nav { background: #1a0533; padding: 14px 40px; display: flex; justify-content: space-between; align-items: center; }
        nav img { height: 52px; }
        nav a { color: #fff; text-decoration: none; }
        .container { max-width: 500px; margin: 40px auto; padding: 40px; background: #fff; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        h2 { margin-bottom: 24px; color: #1a0533; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; }
        #card-element { padding: 12px; border: 1px solid #ddd; border-radius: 8px; }
        button { background-color: #7c3aed; color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: 600; width: 100%; }
        button:hover { background-color: #6d28d9; }
    </style>
</head>
<body>
    <nav>
        <a href="/"><img src="/logo.jpeg" alt="The Real Vacations"></a>
    </nav>

    <div class="container">
        <h2>Update Payment Method</h2>
        <form id="payment-form">
            <div id="card-element"><!-- A Stripe Element will be inserted here. --></div>
            <button id="submit">Update</button>
            <div id="payment-message" class="hidden"></div>
        </form>
    </div>
    <script>
        const stripe = Stripe('YOUR_PUBLIC_KEY'); // Replace with your actual public key
        const elements = stripe.elements();
        const cardElement = elements.create('card');
        cardElement.mount('#card-element');

        const form = document.getElementById('payment-form');
        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            const {paymentMethod, error} = await stripe.createPaymentMethod({
                type: 'card',
                card: cardElement,
            });
            if (error) {
                // Display error.message in your UI.
                document.getElementById('payment-message').textContent = error.message;
            } else {
                // Send paymentMethod.id to your server (for example, using fetch).
                console.log('PaymentMethod ID: ', paymentMethod.id);
                document.getElementById('payment-message').textContent = 'Payment method updated successfully!';
            }
        });
    </script>
</body>
</html>
