<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password | The Real Vacations</title>
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'DM Sans',sans-serif;background:#0f0620;min-height:100vh;display:flex;flex-direction:column}a{text-decoration:none;color:inherit}nav{background:#1a0533;padding:14px 40px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(192,132,252,0.15)}nav img{height:52px}.page{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 24px}.card{background:#fff;border-radius:24px;padding:48px 40px;max-width:440px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.4)}.card h2{font-size:26px;font-weight:800;color:#1a0533;margin-bottom:8px}.card p{font-size:14px;color:#666;margin-bottom:28px;line-height:1.6}.form-group{margin-bottom:20px}.form-group label{display:block;font-size:13px;font-weight:600;color:#1a0533;margin-bottom:7px}.form-group input{width:100%;padding:13px 16px;border:2px solid #e5e7eb;border-radius:12px;font-size:15px;color:#1a0533;background:#fafafa;outline:none;font-family:inherit;transition:border 0.2s}.form-group input:focus{border-color:#7c3aed;background:#fff;box-shadow:0 0 0 4px rgba(124,58,237,0.08)}.reset-btn{width:100%;background:linear-gradient(135deg,#7c3aed,#6d28d9);color:#fff;padding:15px;border-radius:12px;font-weight:700;font-size:16px;border:none;cursor:pointer;font-family:inherit;transition:all 0.2s}.reset-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(124,58,237,0.35)}.reset-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}.back{text-align:center;margin-top:20px;font-size:14px;color:#666}.back a{color:#7c3aed;font-weight:700}.msg{padding:14px;border-radius:12px;margin-bottom:20px;font-size:14px;display:none}.msg.success{display:block;background:#f0fdf4;border:1px solid #bbf7d0;color:#166534}.msg.error{display:block;background:#fef2f2;border:1px solid #fecaca;color:#991b1b}footer{background:#0f0620;color:#555;text-align:center;padding:20px;font-size:12px;border-top:1px solid rgba(255,255,255,0.05)}footer a{color:#c084fc}
</style>
</head>
<body>
<nav><a href="/"><img src="logo.jpeg" alt="The Real Vacations"></a></nav>
<div class="page">
<div class="card">
<h2>Reset Your Password</h2>
<p>Enter your email address and we'll send you a link to reset your password.</p>
<div id="msg" class="msg"></div>
<div class="form-group">
<label for="email">Email Address</label>
<input type="email" id="email" placeholder="you@example.com" autocomplete="email">
</div>
<button class="reset-btn" id="resetBtn" onclick="doReset()">Send Reset Link →</button>
<div class="back"><a href="/login">← Back to Login</a></div>
</div>
</div>
<footer>© 2026 The Real Vacations · <a href="mailto:info@therealvacations.com">info@therealvacations.com</a> · <a href="tel:4049230017">404-923-0017</a></footer>
<script type="module">
import { resetPassword } from './js/auth.js';

window.doReset = async function() {
  const email = document.getElementById('email').value.trim();
  const msg = document.getElementById('msg');
  const btn = document.getElementById('resetBtn');

  if (!email || !email.includes('@')) {
    msg.className = 'msg error';
    msg.textContent = 'Please enter a valid email address.';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Sending...';

  try {
    await resetPassword(email);
    msg.className = 'msg success';
    msg.textContent = '✅ Check your email! We sent a password reset link to ' + email;
    btn.textContent = 'Email Sent ✓';
  } catch (error) {
    msg.className = 'msg error';
    msg.textContent = 'Error: ' + error.message;
    btn.disabled = false;
    btn.textContent = 'Send Reset Link →';
  }
}
</script>
</body>
</html>
