<!DOCTYPE html>
<html lang="en">
<head>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#0f0620;min-height:100vh;display:flex;flex-direction:column}
a{text-decoration:none;color:inherit}
nav{background:#1a0533;padding:14px 40px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(192,132,252,0.15)}
nav img{height:52px}
.page{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 24px}
.card{background:#fff;border-radius:24px;padding:48px 40px;max-width:440px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.4)}
.card h2{font-size:26px;font-weight:800;color:#1a0533;margin-bottom:8px}
.card p{font-size:14px;color:#666;margin-bottom:28px;line-height:1.6}
.form-group{margin-bottom:20px}
.form-group label{display:block;font-size:13px;font-weight:600;color:#1a0533;margin-bottom:7px}
.form-group input{width:100%;padding:13px 16px;border:2px solid #e5e7eb;border-radius:12px;font-size:15px;color:#1a0533;background:#fafafa;outline:none;font-family:inherit;transition:border 0.2s}
.form-group input:focus{border-color:#7c3aed;background:#fff;box-shadow:0 0 0 4px rgba(124,58,237,0.08)}
.reset-btn{width:100%;background:linear-gradient(135deg,#7c3aed,#6d28d9);color:#fff;padding:15px;border-radius:12px;font-weight:700;font-size:16px;border:none;cursor:pointer;font-family:inherit;transition:all 0.2s}
.reset-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(124,58,237,0.35)}
.reset-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.back{text-align:center;margin-top:20px;font-size:14px;color:#666}
.back a{color:#7c3aed;font-weight:700}
.msg{padding:14px;border-radius:12px;margin-bottom:20px;font-size:14px;display:none}
.msg.success{display:block;background:#f0fdf4;border:1px solid #bbf7d0;color:#166534}
.msg.error{display:block;background:#fef2f2;border:1px solid #fecaca;color:#991b1b}
footer{background:#0f0620;color:#555;text-align:center;padding:20px;font-size:12px;border-top:1px solid rgba(255,255,255,0.05)}
footer a{color:#c084fc}
</style>
</head>
<body>
<nav><a href="/"><img src="logo.jpeg" alt="The Real Vacations"></a></nav>
<div class="page">
<div class="card">
<h2>Set New Password</h2>
<p>Enter your new password below to complete your reset.</p>
<div id="msg" class="msg"></div>
<div class="form-group">
<label for="password">New Password</label>
<input type="password" id="password" placeholder="Enter new password" autocomplete="new-password">
</div>
<div class="form-group">
<label for="confirm">Confirm New Password</label>
<input type="password" id="confirm" placeholder="Confirm new password" autocomplete="new-password">
</div>
<button class="reset-btn" id="resetBtn" onclick="doUpdate()">Update Password →</button>
<div class="back"><a href="/login.html">← Back to Login</a></div>
</div>
</div>
<footer>© 2026 The Real Vacations · <a href="mailto:info@therealvacations.com">info@therealvacations.com</a> · <a href="tel:4049230017">404-923-0017</a></footer>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
  'https://lqdflvnkiskzmvvknmmh.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxxZGZsdm5raXNrem12dmtubW1oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzNjY2MjksImV4cCI6MjA5MDk0MjYyOX0.sU1j_bV5bpxJN7dj8Qa-RRc5GWkuYQu5No_WM5Sea4k'
)

const msg = document.getElementById('msg')
const btn = document.getElementById('resetBtn')

// Handle both ?token= (query) and #access_token= (hash) formats
async function init() {
  // Try query params first (our email template uses this)
  const queryParams = new URLSearchParams(window.location.search)
  const token = queryParams.get('token')
  const type = queryParams.get('type')

  // Also check hash params (Supabase default format)
  const hashParams = new URLSearchParams(window.location.hash.substring(1))
  const accessToken = hashParams.get('access_token')
  const refreshToken = hashParams.get('refresh_token')
  const hashType = hashParams.get('type')

  if (token && type === 'recovery') {
    // Our custom email template format
    const { error } = await supabase.auth.verifyOtp({
      token_hash: token,
      type: 'recovery'
    })
    if (error) {
      msg.className = 'msg error'
      msg.textContent = 'This reset link is invalid or has expired. Please request a new one.'
      btn.disabled = true
    }
  } else if (accessToken && hashType === 'recovery') {
    // Supabase default format
    const { error } = await supabase.auth.setSession({
      access_token: accessToken,
      refresh_token: refreshToken || ''
    })
    if (error) {
      msg.className = 'msg error'
      msg.textContent = 'This reset link is invalid or has expired. Please request a new one.'
      btn.disabled = true
    }
  } else {
    // No valid token found
    msg.className = 'msg error'
    msg.textContent = 'Invalid reset link. Please request a new password reset.'
    btn.disabled = true
  }
}

init()

window.doUpdate = async function() {
  const password = document.getElementById('password').value
  const confirm = document.getElementById('confirm').value

  msg.style.display = 'none'

  if (!password || password.length < 6) {
    msg.className = 'msg error'
    msg.textContent = 'Password must be at least 6 characters.'
    return
  }

  if (password !== confirm) {
    msg.className = 'msg error'
    msg.textContent = 'Passwords do not match. Please try again.'
    return
  }

  btn.disabled = true
  btn.textContent = 'Updating...'

  const { data, error } = await supabase.auth.updateUser({ password })

  if (error) {
    msg.className = 'msg error'
    msg.textContent = 'Error: ' + error.message
    btn.disabled = false
    btn.textContent = 'Update Password →'
  } else {
    msg.className = 'msg success'
    msg.textContent = '✅ Password updated successfully! Redirecting to login...'
    btn.textContent = 'Done ✓'
    setTimeout(() => window.location.href = '/login.html', 2500)
  }
}
</script>
</body>
